<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>

    <div id="tela_login" class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuário" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button class="botao_login"type="submit">Entrar</button>           
        </form>
        <p class="redirecionar_cadastro">Não tem login?</p><button class="ir_para_cadastrar" onclick="redirecionarCD()">Cadastrar-se</button>
    </div>

    <div id="tela_cadastro" class="cadastro_container">
        <h2>Cadastro</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha_cadastro" placeholder="Senha">

        <button class="botao_cadastrar" onclick="cadastrar()">Cadastrar</button>
        <div class="link">
            <p>Já tem uma conta? <a href="../login/chat.html">Faça login</a></p>
        </div>
    </div>
    
    <div id="chat_principal" class="chat-container">
        <div class="chatHeader">
            <h2>chat</h2>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
