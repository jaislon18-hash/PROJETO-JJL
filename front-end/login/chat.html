<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>

    <div id="tela_login" class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Email" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <button class="botao_login"type="submit">Entrar</button>           
        </form>
        <p class="redirecionar_cadastro">É novo aqui?</p><button class="ir_para_cadastrar" onclick="redirecionarCD()">Cadastrar-se</button>
    </div>

    <div id="tela_cadastro" class="cadastro_container">
        <h2>Cadastro</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="senha_cadastro" placeholder="Senha">

        <button class="botao_cadastrar" onclick="cadastrar()">Cadastrar</button>
        <div class="link">
            <p>Já tem uma conta?<button class="ir_para_cadastrar" onclick="redirecionarLG()">Faça login</button></p>
        </div>
    </div>
    
    <div id="chat_principal" class="chat-container">
        <div class="chatHeader">
            <h2>chat</h2>
            <button class="botaoNovoContato" onclick="adicionarNovoContato()">novo contato</button>
        </div>
        <div id="listaContatos" class="contatosLayout"></div>
        <template id="templateContato">
            <div class="contato">
                <img src="foto.jpg" class="foto">
                <div class="info">
                    <span class="nome">Nome</span>
                    <span class="mensagem">Última mensagem</span>
                </div>
            </div>
        </template>
        <div class="AreaChat">
            <div class="AreaChat-Header">
                <div id="fotoContatoChat" class="fotoContatoSelecionado">
                    <img src="" id="imgContatoChat">
                </div>
                <div id="nomeContatoChat" class="nomeContatoSelecionado">
                    Selecione um contato
                </div>
            </div>
            <div id="mensagensChat" class="AreaChat-body">
                <!-- Mensagens aparecerão aqui -->
            </div>
            <div class="digitacaoArea">
                <input type="text" id="inputMensagem" placeholder="Digite uma mensagem...">
                <button class="botaoEnviar" onclick="enviarMensagem()">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
